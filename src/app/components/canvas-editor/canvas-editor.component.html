<div class="relative w-full h-full overflow-hidden bg-zinc-900 flex items-center justify-center select-none">
  <!-- Toolbar Container (Floating, smaller, absolute) -->
  <div class="absolute top-4 left-1/2 -translate-x-1/2 flex items-center justify-between gap-3 bg-zinc-900/90 hover:bg-zinc-900/95 backdrop-blur-md border border-zinc-800 rounded-xl px-2.5 py-1.5 shadow-xl z-20 select-none transition-all text-xs text-white max-w-[90%] md:max-w-max">
    <!-- Drawing Tools Group -->
    <div class="flex items-center gap-1 bg-zinc-800/80 p-0.5 rounded-lg">
      <!-- Select/Move Button -->
      <button 
        type="button"
        (click)="setTool('select')"
        [class]="'flex items-center justify-center p-1.5 rounded-md transition-all duration-155 cursor-pointer ' + (activeTool() === 'select' ? 'bg-zinc-700 text-white shadow-xs font-semibold' : 'text-zinc-400 hover:text-white')"
        title="Select & Move (V)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672ZM12 2.25V4.5m5.303.197-1.591 1.591M21.75 12h-2.25m-.197 5.303-1.591-1.591M12 21.75V19.5m-5.303-.197 1.591-1.591M2.25 12h2.25m-.197-5.303 1.591 1.591" />
        </svg>
      </button>

      <!-- Rectangle Draw Button -->
      <button 
        type="button"
        (click)="setTool('rect')"
        [class]="'flex items-center justify-center p-1.5 rounded-md transition-all duration-155 cursor-pointer ' + (activeTool() === 'rect' ? 'bg-zinc-700 text-white shadow-xs font-semibold' : 'text-zinc-400 hover:text-white')"
        title="Draw Rectangle (R)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
          <rect x="4" y="4" width="16" height="16" rx="1.5" stroke="currentColor" fill="none" />
        </svg>
      </button>

      <!-- Polygon Draw Button -->
      <button 
        type="button"
        (click)="setTool('polygon')"
        [class]="'flex items-center justify-center p-1.5 rounded-md transition-all duration-155 cursor-pointer ' + (activeTool() === 'polygon' ? 'bg-zinc-700 text-white shadow-xs font-semibold' : 'text-zinc-400 hover:text-white')"
        title="Draw Polygon (P)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m9 9 6-3 5 5-3 7-8 1-4-5Z" />
        </svg>
      </button>
    </div>

    <div class="h-4 w-[1px] bg-zinc-800"></div>

    <!-- Quick Preset Colors & Advanced styles Trigger -->
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 bg-zinc-800/40 px-1.5 py-0.5 rounded-lg border border-zinc-800/40">
        @for (preset of colorPresets; track preset.name) {
          <button
            type="button"
            (click)="selectPreset(preset)"
            [class]="'w-3.5 h-3.5 rounded-full border transition-all cursor-pointer flex items-center justify-center ' + (selectedPresetName() === preset.name ? 'border-white scale-110 shadow-sm ring-1 ring-zinc-500' : 'border-transparent hover:scale-105')"
            [style.backgroundColor]="preset.stroke"
            [title]="preset.name + ' Preset'"
          >
            @if (selectedPresetName() === preset.name) {
              <span class="w-1 h-1 rounded-full bg-white"></span>
            }
          </button>
        }
      </div>

      <!-- Advanced Custom Styles Popover -->
      <div class="relative">
        <button
          type="button"
          (click)="showAdvancedStyles.set(!showAdvancedStyles())"
          [class]="'p-1.5 rounded-lg border transition-all cursor-pointer ' + (showAdvancedStyles() ? 'bg-white text-zinc-950 border-white shadow-sm' : 'bg-zinc-800/80 hover:bg-zinc-800 text-zinc-300 border-zinc-700/60')"
          title="Advanced Custom Styles"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" class="w-3.5 h-3.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
          </svg>
        </button>

        <!-- Advanced styles panel dropdown -->
        @if (showAdvancedStyles()) {
          <div class="absolute top-full right-0 mt-2.5 w-52 bg-zinc-900/95 backdrop-blur-md border border-zinc-800 rounded-xl p-3 shadow-2xl z-25 flex flex-col gap-3.5 animate-fade-in text-[11px] text-zinc-300">
            <h4 class="font-semibold text-white border-b border-zinc-800 pb-1">Styles</h4>

            <!-- Custom Stroke Color Picker -->
            <div class="flex items-center justify-between gap-2">
              <span class="font-medium text-zinc-400">Stroke:</span>
              <div class="flex items-center gap-1.5">
                <span class="font-mono text-[9px] text-zinc-500">{{ strokeColor() }}</span>
                <div class="relative w-5 h-5 rounded border border-zinc-700 overflow-hidden cursor-pointer flex items-center justify-center bg-zinc-800">
                  <input 
                    type="color" 
                    [value]="strokeColor()" 
                    (input)="onStrokeColorChange($event)"
                    class="absolute inset-0 opacity-0 cursor-pointer w-full h-full scale-150" 
                  />
                  <div class="w-3 h-3 rounded-xs shadow-xs" [style.backgroundColor]="strokeColor()"></div>
                </div>
              </div>
            </div>

            <!-- Custom Fill Color Picker -->
            <div class="flex items-center justify-between gap-2">
              <span class="font-medium text-zinc-400">Fill:</span>
              <div class="flex items-center gap-1.5">
                <span class="font-mono text-[9px] text-zinc-500">{{ fillColor() }}</span>
                <div class="relative w-5 h-5 rounded border border-zinc-700 overflow-hidden cursor-pointer flex items-center justify-center bg-zinc-800">
                  <input 
                    type="color" 
                    [value]="fillColor()" 
                    (input)="onFillColorChange($event)"
                    class="absolute inset-0 opacity-0 cursor-pointer w-full h-full scale-150" 
                  />
                  <div class="w-3 h-3 rounded-xs border border-dashed border-zinc-600 shadow-xs" [style.backgroundColor]="fillColor()"></div>
                </div>
              </div>
            </div>

            <!-- Custom Fill Opacity Slider -->
            <div class="flex flex-col gap-1">
              <div class="flex items-center justify-between">
                <span class="font-medium text-zinc-400">Opacity:</span>
                <span class="font-mono text-[9px] text-zinc-500">{{ (fillOpacity() * 100) | number:'1.0-0' }}%</span>
              </div>
              <input 
                type="range" 
                min="0" 
                max="1" 
                step="0.05" 
                [value]="fillOpacity()" 
                (input)="onOpacityChange($event)"
                class="w-full accent-white cursor-pointer h-1 bg-zinc-800 rounded-lg appearance-none"
              />
            </div>

            <!-- Custom Stroke Width Slider -->
            <div class="flex flex-col gap-1">
              <div class="flex items-center justify-between">
                <span class="font-medium text-zinc-400">Thickness:</span>
                <span class="font-mono text-[9px] text-zinc-500">{{ strokeWidth() }}px</span>
              </div>
              <input 
                type="range" 
                min="1" 
                max="15" 
                step="1" 
                [value]="strokeWidth()" 
                (input)="onStrokeWidthChange($event)"
                class="w-full accent-white cursor-pointer h-1 bg-zinc-800 rounded-lg appearance-none"
              />
            </div>
          </div>
        }
      </div>
    </div>

    <div class="h-4 w-[1px] bg-zinc-800"></div>

    <!-- Actions Group -->
    <div class="flex items-center gap-1.5">
      <!-- Delete selected shape -->
      <button 
        type="button"
        (click)="deleteSelected()"
        [disabled]="!isObjectSelected()"
        [class]="'p-1.5 rounded-lg border transition-all duration-155 cursor-pointer ' + (isObjectSelected() ? 'bg-red-900/40 text-red-400 border-red-900/60 hover:bg-red-900/60' : 'bg-zinc-800/30 text-zinc-600 border-zinc-800/40 cursor-not-allowed')"
        title="Delete Selected Shape (Del / Backspace)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg>
      </button>

      <!-- Clear all shapes -->
      <button 
        type="button"
        (click)="clearAll()"
        class="p-1.5 rounded-lg border bg-zinc-800/80 border-zinc-700/60 hover:bg-zinc-800 text-zinc-300 transition-all duration-150 cursor-pointer"
        title="Clear All Shapes"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Workspace Canvas -->
  <div #canvasContainer class="w-full h-full relative select-none flex items-center justify-center">
    <canvas #editorCanvas></canvas>
  </div>
</div>
